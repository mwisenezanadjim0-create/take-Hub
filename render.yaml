services:
  - type: web
    name: take-hub
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: MONGODB_URI
        placeholder: "Enter your MongoDB Atlas connection string"
      - key: JWT_SECRET
        generateValue: true
